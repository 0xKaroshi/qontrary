<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qontrary — Multi-model adversarial review for AI-generated code</title>
<meta name="description" content="3 models, 3 vendors, independent review. Nothing ships until 2/3 agree.">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0c;
    color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.5rem;
    line-height: 1.6;
  }

  main {
    max-width: 640px;
    width: 100%;
    text-align: center;
  }

  .logo {
    font-size: 3.5rem;
    font-weight: 800;
    letter-spacing: 0.12em;
    margin-bottom: 1.2rem;
    user-select: none;
  }

  .logo-q { color: #ff3b3b; }
  .logo-rest { color: #fff; }

  .tagline {
    font-size: 1.15rem;
    color: #888;
    margin-bottom: 3rem;
    max-width: 480px;
    margin-left: auto;
    margin-right: auto;
  }

  .bullets {
    list-style: none;
    text-align: left;
    max-width: 420px;
    margin: 0 auto 3rem;
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
  }

  .bullets li {
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
    font-size: 1.05rem;
    color: #ccc;
  }

  .bullets li::before {
    content: '';
    flex-shrink: 0;
    width: 8px;
    height: 8px;
    margin-top: 0.5rem;
    border-radius: 50%;
    background: #00d4aa;
  }

  .ctas {
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    justify-content: center;
    margin-bottom: 4rem;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.75rem 1.75rem;
    border-radius: 6px;
    font-size: 0.95rem;
    font-weight: 600;
    text-decoration: none;
    transition: opacity 0.15s;
  }

  .btn:hover { opacity: 0.85; }

  .btn-primary {
    background: #fff;
    color: #0a0a0c;
  }

  .btn-secondary {
    background: transparent;
    color: #00d4aa;
    border: 1.5px solid #00d4aa;
  }

  .btn svg {
    width: 18px;
    height: 18px;
    fill: currentColor;
  }

  .pipeline {
    margin-bottom: 3.5rem;
    padding: 1.5rem;
    border: 1px solid #1a1a1e;
    border-radius: 8px;
    background: #0e0e11;
  }

  .pipeline-stages {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    gap: 0.4rem;
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    font-size: 0.85rem;
  }

  .stage {
    padding: 0.35rem 0.7rem;
    border-radius: 4px;
    background: #161619;
    color: #aaa;
    white-space: nowrap;
  }

  .stage-contrarian {
    background: rgba(255, 59, 59, 0.12);
    color: #ff3b3b;
    border: 1px solid rgba(255, 59, 59, 0.25);
  }

  .arrow { color: #333; font-size: 1rem; }

  footer {
    color: #444;
    font-size: 0.85rem;
  }

  footer a {
    color: #555;
    text-decoration: none;
  }

  footer a:hover { color: #888; }
</style>
</head>
<body>
<main>
  <div class="logo">
    <span class="logo-q">Q</span><span class="logo-rest">ONTRARY</span>
  </div>

  <p class="tagline">Multi-model adversarial review pipeline for AI-generated code</p>

  <div class="pipeline">
    <div class="pipeline-stages">
      <span class="stage">Spec</span>
      <span class="arrow">&rarr;</span>
      <span class="stage">Plan</span>
      <span class="arrow">&rarr;</span>
      <span class="stage">Build</span>
      <span class="arrow">&rarr;</span>
      <span class="stage stage-contrarian">Contrarian</span>
    </div>
  </div>

  <ul class="bullets">
    <li>3 models, 3 vendors, independent review</li>
    <li>Blind tests the builder never sees</li>
    <li>Nothing ships until 2/3 agree</li>
  </ul>

  <div class="ctas">
    <a class="btn btn-primary" href="https://github.com/0xKaroshi/qontrary" target="_blank" rel="noopener">

      GitHub
    </a>
    <a class="btn btn-secondary" href="https://latencyzero.io" target="_blank" rel="noopener">
      Subscribe to LatencyZero
    </a>
  </div>
</main>

<footer>
  Built by <a href="https://x.com/0xKaroshi" target="_blank" rel="noopener">@0xKaroshi</a>
</footer>
</body>
</html>
